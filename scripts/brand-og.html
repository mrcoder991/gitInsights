<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>gitInsights OG</title>
    <style>
      * {
        margin: 0;
        box-sizing: border-box;
      }
      html,
      body {
        width: 1200px;
        height: 630px;
        background: #010409;
        color: #f0f6fc;
        font-family:
          ui-sans-serif,
          system-ui,
          -apple-system,
          'Segoe UI',
          sans-serif;
      }
      .wrap {
        width: 1200px;
        height: 630px;
        display: flex;
        align-items: center;
        padding: 0 72px 0 88px;
        gap: 64px;
      }
      .mark {
        display: grid;
        grid-template-columns: repeat(3, 36px);
        grid-template-rows: repeat(3, 36px);
        gap: 10px;
      }
      .mark span {
        display: block;
        width: 36px;
        height: 36px;
        border-radius: 6px;
      }
      .c1 {
        background: #238636;
      }
      .c2 {
        background: #3fb950;
      }
      .c3 {
        background: #56d364;
      }
      .c4 {
        background: #238636;
        opacity: 0.5;
      }
      .c5 {
        background: #3fb950;
        opacity: 0.65;
      }
      .c6 {
        background: #56d364;
        opacity: 0.8;
      }
      .c7 {
        background: #238636;
        opacity: 0.35;
      }
      .c8 {
        background: #3fb950;
        opacity: 0.45;
      }
      .c9 {
        background: #56d364;
        opacity: 0.55;
      }
      .text h1 {
        font-size: 72px;
        font-weight: 700;
        letter-spacing: -0.03em;
        line-height: 1.05;
        margin-bottom: 20px;
      }
      .text p {
        font-size: 34px;
        font-weight: 500;
        color: #8b949e;
        line-height: 1.35;
        max-width: 720px;
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="mark" aria-hidden="true">
        <span class="c1"></span><span class="c2"></span><span class="c3"></span>
        <span class="c4"></span><span class="c5"></span><span class="c6"></span>
        <span class="c7"></span><span class="c8"></span><span class="c9"></span>
      </div>
      <div class="text">
        <h1>gitInsights</h1>
        <p>your commits, your story. not your boss&apos;s dashboard.</p>
      </div>
    </div>
  </body>
</html>
