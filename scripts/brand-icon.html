<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>gitInsights icon</title>
    <style>
      * {
        margin: 0;
        box-sizing: border-box;
      }
      html,
      body {
        width: 100%;
        height: 100%;
        background: #010409;
      }
      .mark {
        width: 100%;
        height: 100%;
        display: grid;
        place-items: center;
        padding: 10%;
      }
      .grid {
        width: min(78vmin, 360px);
        aspect-ratio: 1;
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        grid-template-rows: repeat(3, 1fr);
        gap: 12%;
      }
      .grid span {
        display: block;
        width: 100%;
        height: 100%;
        border-radius: 18%;
      }
      .c1 {
        background: #238636;
      }
      .c2 {
        background: #3fb950;
      }
      .c3 {
        background: #56d364;
      }
      .c4 {
        background: #238636;
        opacity: 0.5;
      }
      .c5 {
        background: #3fb950;
        opacity: 0.65;
      }
      .c6 {
        background: #56d364;
        opacity: 0.8;
      }
      .c7 {
        background: #238636;
        opacity: 0.35;
      }
      .c8 {
        background: #3fb950;
        opacity: 0.45;
      }
      .c9 {
        background: #56d364;
        opacity: 0.55;
      }
    </style>
  </head>
  <body>
    <div class="mark">
      <div class="grid" aria-hidden="true">
        <span class="c1"></span><span class="c2"></span><span class="c3"></span>
        <span class="c4"></span><span class="c5"></span><span class="c6"></span>
        <span class="c7"></span><span class="c8"></span><span class="c9"></span>
      </div>
    </div>
  </body>
</html>
