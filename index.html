    <script>
      // Single-Page Apps for GitHub Pages — MIT licensed
      // https://github.com/rafgraph/spa-github-pages
      //
      // Pairs with public/404.html: decodes the `?/path&query` blob back into
      // a real path + query and replaces history so React Router sees the
      // original URL (including the OAuth `?code=` on /callback).
      (function (l) {
        if (l.search[1] === '/') {
          var decoded = l.search
            .slice(1)
            .split('&')
            .map(function (s) {
              return s.replace(/~and~/g, '&');
            })
            .join('?');
          window.history.replaceState(null, null, l.pathname.slice(0, -1) + decoded + l.hash);
        }
      })(window.location);
    </script>
