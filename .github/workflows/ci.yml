name: CI

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Unit tests
        run: npm test

      - name: Build
        run: npm run build
        env:
          VITE_GITHUB_CLIENT_ID: ${{ secrets.VITE_GITHUB_CLIENT_ID || 'ci' }}
          VITE_PROXY_URL: ${{ secrets.VITE_PROXY_URL || 'https://ci.invalid/api' }}
          VITE_OAUTH_REDIRECT_URI: ${{ secrets.VITE_OAUTH_REDIRECT_URI || 'https://ci.invalid/cb' }}

      - name: Bundle size
        run: npx size-limit

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('package-lock.json') }}

      - name: Install Playwright
        run: npx playwright install --with-deps

      - name: Vercel proxy smoke
        env:
          VERCEL_PROXY_SMOKE_URL: ${{ secrets.VERCEL_PROXY_SMOKE_URL }}
          VERCEL_PROXY_ALLOWED_ORIGIN: ${{ secrets.VERCEL_PROXY_ALLOWED_ORIGIN }}
        run: npm run smoke:vercel-proxy

      - name: E2E
        run: npm run test:e2e
        env:
          CI: true

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          if-no-files-found: ignore
